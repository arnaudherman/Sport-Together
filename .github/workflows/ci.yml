name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Lint (frontière de couches ADR-0007)
        run: npm run lint
