name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Lint (frontière de couches ADR-0007)
        run: npm run lint

  db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: st_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/st_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Appliquer shims + migrations + grants
        run: |
          psql -h localhost -U postgres -d st_test -v ON_ERROR_STOP=1 -q -f supabase/tests/_shims.sql
          for f in supabase/migrations/*.sql; do
            psql -h localhost -U postgres -d st_test -v ON_ERROR_STOP=1 -q -f "$f"
          done
          psql -h localhost -U postgres -d st_test -v ON_ERROR_STOP=1 -q -f supabase/tests/_grants.sql
      - name: Tests d'isolation RLS / RPC
        run: node supabase/tests/rls.test.mjs
